<p>Hola mundo: {{ title }}</p>

<p>La suma de 2 y 2 es: {{2+2}}</p>

<p>El resultado de duplicar el número 5 es: {{duplicarNumero(5)}}</p>

<p>La película publicada: {{pelicula.titulo}} fue publicada con fecha {{pelicula.fecha |date:"dd/MM/yyyy"}} </p>

<ul>
  <li *ngFor="let pelicula of peliculas">
    <p style="background-color: lightgrey; margin:10px; padding: 10px; box-shadow: 10px;">
      {{pelicula.titulo}} - {{pelicula.precio | currency:'USD':true}}
    </p>
  </li>
</ul>
